openapi: "3.0.3"
info:
  title: Avidus RBAC & Task Manager API
  description: Enterprise-grade Role-Based Access Control system with AI-powered task delegation, real-time audit trails, and autonomous agent orchestration.
  version: "2.0.0"
  contact:
    name: Avidus Interactive
    url: https://www.avidusinteractive.com/

servers:
  - url: http://localhost:5050/api
    description: Local development

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        _id: { type: string }
        name: { type: string }
        email: { type: string, format: email }
        role: { type: string, enum: [admin, user] }
        status: { type: string, enum: [active, inactive] }
        lastLogin: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }

    Task:
      type: object
      properties:
        _id: { type: string }
        title: { type: string }
        description: { type: string }
        status: { type: string, enum: [pending, in_progress, completed] }
        owner: { $ref: "#/components/schemas/User" }
        assignedTo:
          type: object
          properties:
            assigneeType: { type: string, enum: [human, agent] }
            user: { $ref: "#/components/schemas/User" }
            agent: { $ref: "#/components/schemas/Agent" }
        executionLogs:
          type: array
          items:
            type: object
            properties:
              timestamp: { type: string, format: date-time }
              step: { type: string }
              description: { type: string }
              status: { type: string, enum: [info, success, warning, error] }
        result: { type: string }
        createdAt: { type: string, format: date-time }

    Agent:
      type: object
      properties:
        _id: { type: string }
        name: { type: string }
        role: { type: string }
        systemPrompt: { type: string }
        modelName: { type: string }
        status: { type: string, enum: [active, inactive] }
        creator: { $ref: "#/components/schemas/User" }
        createdAt: { type: string, format: date-time }

    ActivityLog:
      type: object
      properties:
        _id: { type: string }
        userId: { $ref: "#/components/schemas/User" }
        action: { type: string }
        details: { type: string }
        createdAt: { type: string, format: date-time }

    ApiResponse:
      type: object
      properties:
        success: { type: boolean }
        data: { type: object }
        message: { type: string }
        error: { type: string }
        serverTime: { type: string, format: date-time }

paths:
  /auth/register:
    post:
      tags: [Authentication]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name: { type: string }
                email: { type: string, format: email }
                password: { type: string, minLength: 6 }
      responses:
        "201": { description: User registered successfully }
        "400": { description: Validation error }

  /auth/login:
    post:
      tags: [Authentication]
      summary: Authenticate and get JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        "200": { description: Login successful, returns token }
        "401": { description: Invalid credentials }
        "403": { description: Account deactivated }

  /auth/me:
    get:
      tags: [Authentication]
      summary: Get current user profile
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Current user data }

  /tasks:
    get:
      tags: [Tasks]
      summary: Get all tasks for current user
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: List of tasks }
    post:
      tags: [Tasks]
      summary: Create a new task
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title: { type: string }
                description: { type: string }
                assignedTo:
                  type: object
                  properties:
                    assigneeType: { type: string, enum: [human, agent] }
                    agent: { type: string }
      responses:
        "201": { description: Task created }

  /tasks/summary:
    get:
      tags: [Tasks]
      summary: Get task status counts
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Task counts grouped by status

  /tasks/{id}:
    put:
      tags: [Tasks]
      summary: Update a task
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: Task updated }
    delete:
      tags: [Tasks]
      summary: Delete a task
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: Task deleted }

  /admin/users:
    get:
      tags: [Admin]
      summary: Get all users (admin only)
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: List of all users }

  /admin/users/{id}/status:
    patch:
      tags: [Admin]
      summary: Toggle user active/inactive status
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: User status updated }

  /admin/users/{id}:
    delete:
      tags: [Admin]
      summary: Delete user and their tasks
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: User deleted }

  /admin/tasks:
    get:
      tags: [Admin]
      summary: Get all tasks with pagination
      security: [{ bearerAuth: [] }]
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 25 }
        - name: status
          in: query
          schema: { type: string }
        - name: q
          in: query
          schema: { type: string }
      responses:
        "200": { description: Paginated tasks list }

  /admin/logs:
    get:
      tags: [Admin]
      summary: Get activity logs with pagination
      security: [{ bearerAuth: [] }]
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        "200": { description: Paginated activity logs }

  /admin/metrics:
    get:
      tags: [Admin]
      summary: Get company-wide metrics
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Dashboard metrics }

  /admin/analytics:
    get:
      tags: [Admin]
      summary: Get detailed analytics with per-user stats
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Analytics data }

  /agents:
    get:
      tags: [Agents]
      summary: Get all AI agents
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: List of agents }
    post:
      tags: [Agents]
      summary: Register a new AI agent
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, role, systemPrompt]
              properties:
                name: { type: string }
                role: { type: string }
                systemPrompt: { type: string }
                modelName: { type: string, default: gpt-4o }
      responses:
        "201": { description: Agent created }

  /agents/{id}/status:
    patch:
      tags: [Agents]
      summary: Toggle agent active/inactive
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: Agent status toggled }

  /agents/{id}:
    delete:
      tags: [Agents]
      summary: Delete an AI agent
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: Agent deleted }
